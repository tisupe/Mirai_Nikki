# ‚Ėó‚ĖĖ ‚Ėó‚ĖĖ‚ĖĄ ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ     ‚Ėź‚ĖĆ ‚ĖĄ‚ĖĄ‚ĖĄ  ‚ĖĄ   ‚ĖĄ ‚Ėó‚ĖĄ‚ĖĄ‚ĖĖ ‚Ėą  ‚Ėź‚ĖĆ‚Ėą ‚Ėó‚Ėě‚ĖÄ‚Ėö‚ĖĖ ‚ĖĄ‚ĖĄ‚ĖĄ
# ‚Ėź‚ĖĆ ‚Ėź‚ĖĆ‚ĖĄ ‚Ėą   ‚Ėą    ‚Ėź‚ĖĆ‚Ėą   ‚Ėą ‚Ėą ‚ĖĄ ‚Ėą ‚Ėź‚ĖĆ ‚Ėź‚ĖĆ‚ĖÄ‚ĖĄ‚ĖĄ‚Ėě‚Ėė‚Ėą ‚Ėź‚Ėõ‚ĖÄ‚ĖÄ‚Ėė‚ĖÄ‚ĖĄ‚ĖĄ
# ‚Ėź‚ĖĆ ‚Ėź‚ĖĆ‚Ėą ‚Ėą   ‚Ėą ‚Ėó‚Ėě‚ĖÄ‚Ėú‚ĖĆ‚ĖÄ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą‚ĖĄ‚Ėą ‚Ėź‚Ėõ‚ĖÄ‚Ėö‚ĖĖ     ‚Ėą ‚ĖĚ‚Ėö‚ĖĄ‚ĖĄ‚ĖĖ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖÄ
# ‚Ėź‚Ėô‚Ėą‚Ėü‚ĖĆ‚Ėą       ‚ĖĚ‚Ėö‚ĖĄ‚Ėü‚ĖĆ            ‚Ėź‚ĖĆ ‚Ėź‚ĖĆ     ‚Ėą

# Idle Inhibit
windowrule = idle_inhibit fullscreen true, match:content 2 3

# Size
windowrule = size 790 600,match:class ^(org.freedesktop.impl.portal.desktop.kde)$
windowrule = size 550 575,match:class ^(qt6ct)$
windowrule = size 550 575,match:class ^(qt5ct)$

# Picture-in-Picture
windowrule {
    name = picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    tag = +picture-in-picture
    float = true
    keep_aspect_ratio = true
    move = (monitor_w*0.666) (monitor_h*0.69)
    size = (monitor_w*0.30) (monitor_h*0.30)
    pin = true
}

# No Decoration
windowrule = no_blur on, match:content 2 3
windowrule = no_dim on, match:content 2 3
windowrule = no_shadow on, match:content 2 3
windowrule = no_anim on, match:content 2 3

# Float
windowrule = float true,match:class ^(qt5ct)$
windowrule = float true,match:class ^(qt6ct)$
windowrule = float true,match:class ^(org.freedesktop.impl.portal.desktop.kde)$
windowrule = float true,match:class ^(io.github.kaii_lb.Overskride)$
windowrule = float true,match:class ^(swayimg)$
windowrule = float true,match:class ^(com.gabm.satty)$
windowrule = float true,match:class ^(yad)$ # Protontricks-Gtk
windowrule = float true,match:title ^(Friends List)$ # Steam Friends List
windowrule = float true,match:title ^(Steam Settings)$ # Steam Settings
