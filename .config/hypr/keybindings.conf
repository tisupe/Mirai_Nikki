# ‚Ėź‚ĖĆ‚Ėó‚Ėě‚Ėė‚Ėź‚Ėõ‚ĖÄ‚ĖÄ‚Ėė‚Ėą   ‚Ėą ‚Ėź‚ĖĆ   ‚ĖĄ ‚Ėą   ‚Ėą    ‚Ėź‚ĖĆ‚ĖĄ ‚Ėą   ‚Ėą ‚ĖÄ‚ĖĄ‚ĖĄ
# ‚Ėź‚Ėõ‚Ėö‚ĖĖ ‚ĖĚ‚Ėö‚ĖĄ‚ĖĄ‚ĖĖ ‚ĖÄ‚ĖÄ‚ĖÄ‚Ėą ‚Ėź‚Ėõ‚ĖÄ‚Ėö‚ĖĖ‚Ėą ‚Ėą   ‚Ėą ‚Ėó‚Ėě‚ĖÄ‚Ėú‚ĖĆ‚Ėą ‚Ėą   ‚Ėą ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖÄ
# ‚Ėź‚ĖĆ ‚Ėź‚ĖĆ     ‚ĖĄ   ‚Ėą ‚Ėź‚Ėô‚ĖĄ‚Ėě‚Ėė‚Ėą       ‚ĖĚ‚Ėö‚ĖĄ‚Ėü‚ĖĆ‚Ėą     ‚Ėó‚ĖĄ‚ĖĖ
#            ‚ĖÄ‚ĖÄ‚ĖÄ                         ‚Ėź‚ĖĆ ‚Ėź‚ĖĆ
#                                         ‚ĖĚ‚ĖÄ‚Ėú‚ĖĆ
#                                        ‚Ėź‚Ėô‚ĖĄ‚Ėě‚Ėė

$mainMod = SUPER
$ipc = qs -c noctalia-shell

# Utilities & System
    ## Noctalia Shell
    bind = $mainMod, Delete, exec, $ipc ipc call settings toggle
    bind = $mainMod, A, exec, $ipc ipc call launcher toggle
    bind = $mainMod, Backslash, exec, $ipc ipc call controlCenter toggle
    bind = $mainMod, L, exec, $ipc ipc call lockScreen lock
    bind = $mainMod, N, exec, $ipc ipc call notifications toggleHistory
    bind = $mainMod, V, exec, $ipc ipc call launcher clipboard
    bind = $mainMod, comma, exec, $ipc ipc call launcher emoji
    bind = $mainMod, period, exec, $ipc ipc call plugin:kaomoji toggle
    bind = , XF86NotificationCenter, exec, $ipc ipc call notifications toggleHistory

    ## Hardware controls
        ### Volume
        bindel = , XF86AudioRaiseVolume, exec, $ipc ipc call volume increase
        bindel = , XF86AudioLowerVolume, exec, $ipc ipc call volume decrease
        bindl = , XF86AudioMute, exec, $ipc ipc call volume muteOutput

        ### Brightness
        bindel = , XF86MonBrightnessUp, exec, $ipc ipc call brightness increase
        bindel = , XF86MonBrightnessDown, exec, $ipc ipc call brightness decrease

        ### Media
        bind  = $mainMod, Home, exec, playerctl play-pause
        bind  = $mainMod, Insert, exec, playerctl next
        bind  = $mainMod, End, exec, playerctl previous

        ### Screen Capture
        bind = , Print, exec, /home/tisupe/Mirai_Nikki/lib/screenshot.sh p # all monitors screenshot capture
        bind = $mainMod, P, exec, /home/tisupe/Mirai_Nikki/lib/screenshot.sh s # partial screenshot capture
        bind = $mainMod Control, P, exec, /home/tisupe/Mirai_Nikki/lib/screenshot.sh sf # partial screenshot capture (frozen screen)
        bind = $mainMod Alt, P, exec, /home/tisupe/Mirai_Nikki/lib/screenshot.sh m # monitor screenshot capture
        bind = $mainMod Shift, C, exec, hyprpicker -a

# Apps
bind = $mainMod, T, exec, kitty
bind = $mainMod, E, exec, dolphin
bind = $mainMod, C, exec, zeditor
bind = $mainMod, B, exec, zen-browser
bind = $mainMod, S, exec, spotify
bind = $mainMod, D, exec, discord

# Window Management
bind = SUPER, F4 , exec, kill -9 $(hyprctl activewindow -j | jq .pid)
bind = $mainMod, Q, killactive
bind = $mainMod, W, togglefloating
bind = $mainMod, F11, fullscreen

# Workspaces
    ## Move/Switch to special workspace
    bind = $mainMod Shift, Space, movetoworkspace, special
    bind = $mainMod Alt, Space, movetoworkspacesilent, special
    bind = $mainMod, Space, togglespecialworkspace

    ## Move to workspaces
    bind = $mainMod, 1, workspace, 1
    bind = $mainMod, 2, workspace, 2
    bind = $mainMod, 3, workspace, 3
    bind = $mainMod, 4, workspace, 4
    bind = $mainMod, 5, workspace, 5
    bind = $mainMod, 6, workspace, 6
    bind = $mainMod, 7, workspace, 7
    bind = $mainMod, 8, workspace, 8
    bind = $mainMod, 9, workspace, 9
    bind = $mainMod, 0, workspace, 10

    ## Move focused window to a workspace
    bind = $mainMod Shift, 1, movetoworkspace, 1
    bind = $mainMod Shift, 2, movetoworkspace, 2
    bind = $mainMod Shift, 3, movetoworkspace, 3
    bind = $mainMod Shift, 4, movetoworkspace, 4
    bind = $mainMod Shift, 5, movetoworkspace, 5
    bind = $mainMod Shift, 6, movetoworkspace, 6
    bind = $mainMod Shift, 7, movetoworkspace, 7
    bind = $mainMod Shift, 8, movetoworkspace, 8
    bind = $mainMod Shift, 9, movetoworkspace, 9
    bind = $mainMod Shift, 0, movetoworkspace, 10

    ## Move focused window to a workspace silently
    bind = $mainMod Alt, 1, movetoworkspacesilent, 1
    bind = $mainMod Alt, 2, movetoworkspacesilent, 2
    bind = $mainMod Alt, 3, movetoworkspacesilent, 3
    bind = $mainMod Alt, 4, movetoworkspacesilent, 4
    bind = $mainMod Alt, 5, movetoworkspacesilent, 5
    bind = $mainMod Alt, 6, movetoworkspacesilent, 6
    bind = $mainMod Alt, 7, movetoworkspacesilent, 7
    bind = $mainMod Alt, 8, movetoworkspacesilent, 8
    bind = $mainMod Alt, 9, movetoworkspacesilent, 9
    bind = $mainMod Alt, 0, movetoworkspacesilent, 10

    ## Move focused window to a relative workspace silently
    bind = $mainMod Alt, Right, movetoworkspacesilent, r+1
    bind = $mainMod Alt, Left, movetoworkspacesilent, r-1
    bind = $mainMod Alt, Down, movetoworkspacesilent, empty+1
    bind = $mainMod Alt, Up, movetoworkspacesilent, empty-1

    ## Move focused window to a relative workspace
    bind = $mainMod Shift, Right, movetoworkspace, r+1
    bind = $mainMod Shift, Left, movetoworkspace, r-1
    bind = $mainMod Shift, Down, movetoworkspace, empty+1
    bind = $mainMod Shift, Up, movetoworkspace, empty-1

    ## Move to nearest empty workspace
    bind = $mainMod, Page_Down, workspace, empty
    bind = $mainMod, Page_Up, workspace, empty

    ## Move to relative workspaces
    bind = $mainMod, Right, workspace, r+1
    bind = $mainMod, Left, workspace, r-1
    bind = $mainMod, Down, workspace, e-1
    bind = $mainMod, Up, workspace, e+1

    ## Group
    bind = $mainMod, G, togglegroup
    bind = $mainMod Shift ALT, Left, changegroupactive, b
    bind = $mainMod Shift ALT, Right, changegroupactive, f

    ## Change focus
    bind = ALT, Tab, cyclenext, all
    bind = $mainMod Control, Left, movefocus, l
    bind = $mainMod Control, Right, movefocus, r
    bind = $mainMod Control, Up, movefocus, u
    bind = $mainMod Control, Down, movefocus, d

    ## Resize windows
    bindel = $mainMod Control_L Alt, Right, resizeactive, 30 0
    bindel = $mainMod Control_L Alt, Left, resizeactive, -30 0
    bindel = $mainMod Control_L Alt, Up, resizeactive, 0 -30
    bindel = $mainMod Control_L Alt, Down, resizeactive, 0 30

    ## Move/Resize focused window with cursor
    bindm = $mainMod, mouse:272, movewindow
    bindm = $mainMod, mouse:273, resizewindow
    bindm = $mainMod, Z, movewindow
    bindm = $mainMod, X, resizewindow

    ## Move active window around current workspace
    bind = $mainMod SHIFT CONTROL, left,  exec, hyprctl activewindow -j | jq -r .floating | grep -q "true" && hyprctl dispatch moveactive -30 0 || hyprctl dispatch movewindow l
    bind = $mainMod SHIFT CONTROL, right, exec, hyprctl activewindow -j | jq -r .floating | grep -q "true" && hyprctl dispatch moveactive 30 0 || hyprctl dispatch movewindow r
    bind = $mainMod SHIFT CONTROL, up,    exec, hyprctl activewindow -j | jq -r .floating | grep -q "true" && hyprctl dispatch moveactive 0 -30 || hyprctl dispatch movewindow u
    bind = $mainMod SHIFT CONTROL, down,  exec, hyprctl activewindow -j | jq -r .floating | grep -q "true" && hyprctl dispatch moveactive 0 30 || hyprctl dispatch movewindow d
